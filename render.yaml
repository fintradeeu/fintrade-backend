# Render Blueprint — deploy backend + database in one click
# Usage: Push to GitHub, then go to https://render.com/deploy
# and paste your repo URL

databases:
  - name: fittrade-db
    plan: free
    databaseName: fittrade_lms
    user: fittrade_user

services:
  - type: web
    name: fittrade-backend
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fittrade-db
          property: connectionString
        # Render provides postgresql:// but we need postgresql+asyncpg://
        # We handle this transform in config.py
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_NAME
        value: FItTrade LMS
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENAI_API_KEY
        value: ""
      - key: USE_MILVUS
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
