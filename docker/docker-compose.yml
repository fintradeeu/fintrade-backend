  #     - "9091:9091"
  #   environment:
  #     ETCD_USE_EMBED: "true"
  #     COMMON_STORAGETYPE: local
  #   volumes:
  #     - milvusdata:/var/lib/milvus

  # ── Redis (optional — uncomment to enable caching) ────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: lms_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data

volumes:
  pgdata:
